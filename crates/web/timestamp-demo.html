<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>figgy timestamp axis demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5c6672;
      --panel: #f6f8fb;
      --line: #d7dde6;
      --accent: #0b6e8f;
      --accent-strong: #094f6a;
      --warm: #b85b28;
      --ok: #2a7f62;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: var(--ink);
    }

    .shell {
      width: min(1420px, 100vw);
      margin: 0 auto;
      padding: 18px clamp(12px, 2vw, 24px) 24px;
    }

    .bar {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
    }

    label {
      display: grid;
      gap: 5px;
      min-width: 112px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 650;
    }

    label.wide { min-width: 204px; }
    label.range { min-width: 180px; }

    select,
    input,
    button {
      height: 34px;
      border: 1px solid #bac5d3;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
    }

    select,
    input[type="datetime-local"] {
      padding: 0 9px;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    button {
      padding: 0 12px;
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--accent-strong); }
    button:disabled { cursor: wait; opacity: 0.65; }

    .readout {
      min-height: 34px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-left: 3px solid var(--warm);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.3;
      flex: 1 1 340px;
    }

    .stage {
      margin-top: 14px;
      width: var(--chart-width, 1040px);
      max-width: 100%;
      height: 610px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    figgy-chart {
      display: block;
      width: 100%;
      height: 100%;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      background: #fff;
    }

    .pill strong {
      color: var(--ok);
      font-weight: 750;
    }

    @media (max-width: 720px) {
      .shell { padding: 10px; }
      .bar { align-items: stretch; }
      label,
      label.wide,
      label.range {
        min-width: min(100%, 220px);
        flex: 1 1 150px;
      }
      .stage { height: 520px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="bar" aria-label="timestamp axis controls">
      <label class="wide">Center
        <input id="center" type="datetime-local" step="1" />
      </label>
      <label>Window
        <select id="window">
          <option value="10000">10 seconds</option>
          <option value="60000">1 minute</option>
          <option value="300000">5 minutes</option>
          <option value="7200000">2 hours</option>
          <option value="172800000">2 days</option>
          <option value="7776000000">90 days</option>
          <option value="94608000000">3 years</option>
        </select>
      </label>
      <label>Data unit
        <select id="unit">
          <option value="Milliseconds">Milliseconds</option>
          <option value="Seconds">Seconds</option>
          <option value="Microseconds">Microseconds</option>
        </select>
      </label>
      <label>Timezone
        <select id="zone">
          <option value="Utc">UTC</option>
          <option value="KST">KST +09:00</option>
          <option value="PDT">PDT -07:00</option>
        </select>
      </label>
      <label>Fractions
        <select id="fraction">
          <option value="Auto">Auto</option>
          <option value="0">Fixed 0</option>
          <option value="3">Fixed 3</option>
          <option value="6">Fixed 6</option>
        </select>
      </label>
      <label>Label
        <select id="label-mode">
          <option value="Auto">Auto</option>
          <option value="%H:%M:%S.%f">Time + fraction</option>
          <option value="%Y-%m-%d %H:%M">Date + minute</option>
          <option value="%Y-%m-%d %H:%M:%S.%f">Full</option>
        </select>
      </label>
      <label class="range">Chart width
        <input id="chart-width" type="range" min="520" max="1280" step="20" value="1040" />
      </label>
      <label>Export
        <select id="export-scale">
          <option value="1">1x</option>
          <option value="2" selected>2x</option>
          <option value="4">4x</option>
        </select>
      </label>
      <button id="export">PNG</button>
      <div id="status" class="readout">initializing</div>
    </section>

    <section id="stage" class="stage">
      <figgy-chart id="chart"></figgy-chart>
    </section>

    <div class="meta">
      <span class="pill"><strong>Float64Array</strong> timestamp upload</span>
      <span class="pill">GPU hi/lo coordinate path</span>
      <span class="pill">AutoCalendar label collision pass</span>
    </div>
  </main>

  <script type="module">
    import "./figgy-chart.js?v=timestamp-demo";

    const POINTS = 260;
    const chart = document.getElementById("chart");
    const stage = document.getElementById("stage");
    const status = document.getElementById("status");
    const centerInput = document.getElementById("center");
    const windowSelect = document.getElementById("window");
    const unitSelect = document.getElementById("unit");
    const zoneSelect = document.getElementById("zone");
    const fractionSelect = document.getElementById("fraction");
    const labelModeSelect = document.getElementById("label-mode");
    const widthInput = document.getElementById("chart-width");
    const exportScaleSelect = document.getElementById("export-scale");
    const exportButton = document.getElementById("export");

    const unitDivisor = {
      Seconds: 1000,
      Milliseconds: 1,
      Microseconds: 0.001,
    };

    const zoneValue = {
      Utc: "Utc",
      KST: { FixedOffsetMinutes: 540 },
      PDT: { FixedOffsetMinutes: -420 },
    };

    const pad = (value) => String(value).padStart(2, "0");
    function localInputValue(date) {
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate()),
      ].join("-") + "T" + [
        pad(date.getHours()),
        pad(date.getMinutes()),
        pad(date.getSeconds()),
      ].join(":");
    }

    function formatRange(startMs, endMs) {
      const fmt = new Intl.DateTimeFormat("en-CA", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false,
        timeZone: "UTC",
      });
      return `${fmt.format(new Date(startMs))} UTC to ${fmt.format(new Date(endMs))} UTC`;
    }

    function timestampFormat() {
      const fractionRaw = fractionSelect.value;
      return {
        Timestamp: {
          unit: unitSelect.value,
          timezone: zoneValue[zoneSelect.value],
          label: labelModeSelect.value === "Auto"
            ? "Auto"
            : { Pattern: labelModeSelect.value },
          fractional: fractionRaw === "Auto"
            ? "Auto"
            : { Fixed: Number(fractionRaw) },
          tick_policy: "AutoCalendar",
        },
      };
    }

    function generateData(startMs, endMs, unit) {
      const x = new Float64Array(POINTS);
      const y = new Float32Array(POINTS);
      const span = Math.max(1, endMs - startMs);
      const divisor = unitDivisor[unit] ?? 1;
      for (let i = 0; i < POINTS; i += 1) {
        const phase = i / Math.max(1, POINTS - 1);
        const ms = startMs + span * phase;
        x[i] = ms / divisor;
        y[i] =
          0.72 * Math.sin(phase * Math.PI * 6.0) +
          0.22 * Math.sin(phase * Math.PI * 27.0 + 0.45) +
          0.08 * Math.cos(phase * Math.PI * 53.0);
      }
      return { x, y, min: startMs / divisor, max: endMs / divisor };
    }

    function updateConfig(startValue, endValue) {
      const cfg = JSON.parse(chart.get_config());
      cfg.bottom_x.min = startValue;
      cfg.bottom_x.max = endValue;
      cfg.bottom_x.scale = "Linear";
      cfg.bottom_x.major_spacing = Math.max((endValue - startValue) / 6, 1e-12);
      cfg.bottom_x.minor_count = 0;
      cfg.bottom_x.label_style.format = timestampFormat();
      cfg.bottom_x.label_style.significant_digits = 6;
      cfg.bottom_x.label_style.font_size = 15;
      cfg.bottom_x.out_margin = 86;
      cfg.left_y.min = -1.3;
      cfg.left_y.max = 1.3;
      cfg.left_y.major_spacing = 0.5;
      cfg.left_y.minor_count = 1;
      cfg.left_y.label_style.font_size = 15;
      chart.set_config(JSON.stringify(cfg));
    }

    function update() {
      const center = new Date(centerInput.value || Date.now()).getTime();
      const spanMs = Number(windowSelect.value);
      const startMs = center - spanMs / 2;
      const endMs = center + spanMs / 2;
      const unit = unitSelect.value;
      const data = generateData(startMs, endMs, unit);

      chart.set_column_f64("timestamp_x", data.x);
      chart.set_column_f32("signal_y", data.y);
      chart.add_line_series("timestamp_signal", "timestamp_x", "signal_y", 2.0, "signal");
      updateConfig(data.min, data.max);
      chart.set_title("Timestamp axis scaling");
      chart.set_x_title(`Unix time (${unit.toLowerCase()})`);
      chart.set_y_title("signal");
      chart.frame();

      const unitLabel = unit.toLowerCase();
      status.textContent =
        `${formatRange(startMs, endMs)} | ${POINTS} points | ${unitLabel} | width ${widthInput.value}px`;
    }

    function setStageWidth() {
      stage.style.setProperty("--chart-width", `${widthInput.value}px`);
      chart.resize();
      update();
    }

    for (const input of [centerInput, windowSelect, unitSelect, zoneSelect, fractionSelect, labelModeSelect]) {
      input.addEventListener("input", update);
      input.addEventListener("change", update);
    }
    widthInput.addEventListener("input", setStageWidth);

    exportButton.addEventListener("click", async () => {
      if (chart.busy) return;
      exportButton.disabled = true;
      try {
        const scale = Number(exportScaleSelect.value);
        const png = await chart.export_png(scale);
        const url = URL.createObjectURL(new Blob([png], { type: "image/png" }));
        const a = Object.assign(document.createElement("a"), {
          href: url,
          download: `figgy-timestamp-${scale}x.png`,
        });
        a.click();
        URL.revokeObjectURL(url);
      } catch (error) {
        console.error("export:", error);
        status.textContent = `export failed: ${error?.message ?? error}`;
      } finally {
        exportButton.disabled = false;
      }
    });

    chart.addEventListener("figgy-error", (event) => {
      const message = event.detail.error?.message ?? event.detail.error;
      status.textContent = `error: ${message}`;
    });

    try {
      centerInput.value = localInputValue(new Date());
      windowSelect.value = "300000";
      await chart.ready;
      setStageWidth();
      window.figgyChart = chart;
    } catch (error) {
      console.error("init:", error);
      status.textContent = `init failed: ${error?.message ?? error}`;
      throw error;
    }
  </script>
</body>
</html>
